# ============================================
# GERALD-SNIPER CONFIG v4.0 (PRODUCTION)
# ============================================
# Философия: ТИШИНА > ШУМ. Лучше 0 алертов в тихий день,
# чем 20 мусорных. Каждый алерт = ты встаёшь и идёшь к монитору.
# Если алерт не стоит этого — он не должен существовать.

# ==========================================
# СЕКЦИЯ 1: ПОДКЛЮЧЕНИЯ
# ==========================================
bybit:
  rest_url: "https://api.bybit.com"
  # Fallback для РФ (если основной заблокирован):
  rest_url_fallback: "https://api.bytick.com"
  ws_url: "wss://stream.bybit.com/v5/public/linear"
  ws_url_fallback: "wss://stream.bytick.com/v5/public/linear"

  # REST API Fallback (НОВОЕ):
  fallback_switch_after_failures: 3 # Переключение после 3 провалов
  fallback_primary_recheck_sec: 600 # Проверять primary каждые 10 мин

  # WebSocket управление (НОВОЕ):
  ws_ping_interval_sec: 18 # Bybit требует ping каждые 20с, шлём с запасом
  ws_reconnect_delay_sec: 3 # Пауза перед переподключением
  ws_max_reconnect_attempts: 10 # После 10 попыток — переключиться на fallback URL
  ws_max_subscriptions_per_conn: 190 # Лимит Bybit 200, берём с запасом

telegram:
  bot_token: "${SNIPER_BOT_TOKEN}" # Из .env, НИКОГДА не хардкод
  chat_id: "${SNIPER_CHAT_ID}"
  # Анти-спам (СНЯТЫ ОГРАНИЧЕНИЯ ДЛЯ АГРЕССИВНОГО ТРЕЙДИНГА):
  max_sniper_alerts_per_day: 500 # Увеличено со 15 до 500
  max_setup_notifications_per_day: 1000 # Увеличено с 30 до 1000
  message_queue_size: 500 # Увеличено с 50 до 500

# ==========================================
# СЕКЦИЯ 2: МАКРО-ФИЛЬТР (НОВОЕ — КРИТИЧНО)
# ==========================================
# Без этого снайпер слепой. BTC определяет 70% движений альтов.
macro_filter:
  enabled: true

  btc_symbol: "BTCUSDT"
  btc_trend_timeframe: "60" # H1 для определения тренда

  # Правила блокировки алертов:
  # Если BTC упал >3% за 4 часа — НЕ слать лонговые алерты по альтам
  block_alt_longs_if_btc_drop_4h_pct: 3.0
  # Если BTC вырос >3% за 4 часа — НЕ слать шортовые алерты по альтам
  block_alt_shorts_if_btc_pump_4h_pct: 3.0

  # BTC сам по себе торгуется всегда (он не зависит от "рынка")
  btc_exempt_from_macro: true

  # Средний фандинг рынка:
  # Если средний funding top-20 монет > 0.08% — рынок перегрет в лонг
  # Добавить предупреждение в алерт: "⚠️ Рынок перегрет"
  market_funding_warning_threshold: 0.0008 # 0.08%


# ==========================================
# СЕКЦИЯ 2.5: МАКРО-РАДАР (Макро-аномалии)
# ==========================================
# [GEKTOR v8.1] Сканер макро-аномалий для ручной торговли.
# Сканирует ВСЕ 300+ тикеров в 1 запрос, шлёт в ТГ только золотые сигналы.
# Бюджет API: ~8 запросов/мин (вместо 120+ в RadarV2).
macro_radar:
  enabled: true
  scan_interval_sec: 60       # Цикл сканирования (секунды)

  # --- Фильтры ликвидности ---
  min_turnover_24h_usd: 5000000  # $5M
  min_candle_turnover_usd: 500000 # $500K

  # --- Пороги аномалии ---
  min_rvol: 3.0               # RVOL > 3x
  min_oi_delta_pct: 5.0        # OI Delta > 5%
  min_price_move_pct: 1.5      # Price move > 1.5%

  # --- Антиспам ---
  alert_cooldown_sec: 300      # 5 мин между алертами одной монеты

  # --- Чёрный список ---
  blacklist:
    - "LUNAUSDT"
    - "USTCUSDT"
    - "FTTUSDT"

# ==========================================
# СЕКЦИЯ 3: РАДАР (Скринер ликвидности)
# ==========================================
watchlist:
  - "BTCUSDT"
  - "ETHUSDT"
  - "SOLUSDT"

radar:
  enabled: false
  interval_minutes: 10 # Было 15. 10 минут — оптимальный баланс

  # --- ЖЁСТКИЕ ФИЛЬТРЫ ЛИКВИДНОСТИ ---
  # Монеты с объёмом ниже $5M — неликвид. Спред сожрёт прибыль.
  min_volume_24h_usd: 5000000 # $5M — минимальный порог для фьючерсов

  # Размер вотчлиста: АГРЕССИВНО УВЕЛИЧЕН. Больше монет, больше возможностей.
  watchlist_size: 100

  # --- RELATIVE VOLUME (RVOL) ---
  # RVOL — главный фильтр. Он отвечает на вопрос:
  # "Эта монета сейчас торгуется активнее, чем обычно?"
  #
  # RVOL 1.0 = норма (НЕ фильтр). RVOL 2.0 = в 2 раза активнее нормы.
  # Для large caps (BTC, ETH) порог ниже: их "нормальный" объём уже огромен,
  # рост на 50% уже значим.
  # Для альтов порог выше: у них объём скачет на 100% от одного кита.
  rvol_min_large_caps: 1.1
  rvol_min_altcoins: 1.2
  rvol_lookback_days: 14 # Период расчёта среднего (2 недели)

  # --- OPEN INTEREST ---
  # Рост OI = новые деньги входят в позиции.
  # 2% за 4 часа — нормальная флуктуация. 5%+ — кто-то набирает позицию.
  delta_oi_min_pct: 2.0
  delta_oi_lookback_hours: 4

  # --- ВОЛАТИЛЬНОСТЬ (ATR) ---
  # Монета должна двигаться достаточно, чтобы пробой давал прибыль
  # после вычета комиссии (0.06% × 2 = 0.12% round trip).
  # ATR 1.5% = ход 1.5% в день. Пробой даст 0.3-0.5% — еле-еле.
  # ATR 3%+ = ход 3% в день. Пробой может дать 1-2%.
  atr_min_pct: 1.5
  atr_period: 14 # ATR(14) на H1

  # --- FUNDING RATE ---
  # Экстремальный фандинг НЕ блокирует монету, но влияет на скоринг.
  # Здесь указываем пороги для модификатора скора.
  funding_penalty_threshold: 0.0005 # >0.05% = штраф к лонговому скору
  funding_bonus_threshold: -0.0001 # <-0.01% = бонус к лонговому скору

  # --- ФИЛЬТР МОНЕТ ---
  large_caps:
    - "BTCUSDT"
    - "ETHUSDT"
    - "SOLUSDT"
    - "BNBUSDT"
    - "XRPUSDT"
    - "DOGEUSDT"
    - "ADAUSDT"
    - "AVAXUSDT"
    - "LINKUSDT"
    - "SUIUSDT"

  # Чёрный список: монеты, которые НИКОГДА не попадут в вотчлист.
  # Причины: делистинг, манипуляции маркетмейкера, неадекватный спред.
  blacklist:
    - "LUNAUSDT" # Dead project
    - "USTCUSDT" # Dead project
    - "FTTUSDT" # Dead project
    # Добавляй сюда монеты, которые дают стабильно ложные сигналы

  # --- МИНИМАЛЬНЫЙ СКОР ДЛЯ ПОПАДАНИЯ В ВОТЧЛИСТ ---
  # Монета проходит в вотчлист, только если прошла минимум 2 из 3 основных
  # фильтров (RVOL, delta_OI, ATR).
  min_filters_passed: 1

# ==========================================
# СЕКЦИЯ 4: ДЕТЕКТОР УРОВНЕЙ
# ==========================================
levels:
  # НОВОЕ: Динамические уровни
  enable_dynamic_levels: true # Включить week extremes + round numbers
  dynamic_level_max_strength: 75 # Макс сила динамического уровня

  # НОВОЕ: Адаптивные пороги
  adaptive_params_enabled: true # Авто-подстройка под ATR монеты

  # --- Данные ---
  candles_lookback: 168 # 168 H1 свечей = 7 дней. Оптимально.
  recalculate_interval_minutes: 60 # Пересчёт раз в час (после закрытия H1)
  timeframe: "60" # H1 для расчёта уровней

  # --- Алгоритм поиска экстремумов ---
  swing_order: 5 # Окно: точка — экстремум если выше/ниже 5 свечей вокруг

  # --- KDE параметры ---
  kde_bandwidth: 0.015 # Ширина ядра. 0.015 ≈ 1.5% ценового диапазона.
  # НОВОЕ: автокалибровка bandwidth в зависимости от волатильности монеты
  kde_bandwidth_adaptive: true # Для волатильных монет bandwidth увеличивается
  kde_bandwidth_min: 0.008 # Для стейблкоин-подобных (BTC)
  kde_bandwidth_max: 0.025 # Для мемкоинов (PEPE, WIF)

  # --- Валидация уровней ---
  # 3 касания — минимум для настоящего уровня.
  # 2 касания = два случайных совпадения. Математически неизбежно.
  min_touches: 2 # Reduced from 3 to allow more levels and signals passes

  # Допуск касания: насколько близко к уровню должен быть экстремум,
  # чтобы считаться "касанием".
  # НОВОЕ: адаптивный допуск в зависимости от цены монеты.
  touch_tolerance_pct: 0.003 # Было 0.005 (0.5%). Возвращаем 0.3%.
  # Для монет с ценой > $10000 (BTC): допуск 0.2%
  # Для монет с ценой < $0.01 (мемкоины): допуск 0.5%
  touch_tolerance_adaptive: true
  touch_tolerance_high_price: 0.002 # Для BTC/ETH
  touch_tolerance_low_price: 0.005 # Для PEPE/SHIB
  price_threshold_high: 1000.0 # "Дорогая" монета: > $1000
  price_threshold_low: 0.1 # "Дешёвая" монета: < $0.1

  # Максимальное расстояние от текущей цены до уровня.
  max_distance_pct: 15.0 # Увеличено до 15.0 для нейронной адаптации
  # Максимум уровней на одну монету
  max_levels_per_coin: 15 # Увеличено с 6 до 15

  # --- "СВЕЖЕСТЬ" УРОВНЯ (НОВОЕ) ---
  # Уровень, который последний раз тестировался 5 дней назад,
  # менее актуален чем тот, который тестировался вчера.
  freshness_enabled: true
  freshness_decay_hours: 72 # После 72ч без касания — штраф к силе уровня
  freshness_penalty_pct: 20 # Штраф: -20% к strength_score

# ==========================================
# СЕКЦИЯ 5: ДЕТЕКТОР ТРИГГЕРОВ (v5.0 — SOFTENED)
# ==========================================
triggers:
  # --- НОВЫЙ: BB Squeeze Fire — #1 сигнал начала крупных движений ---
  # BB (Bollinger) внутри KC (Keltner) = сжатие.
  # Когда BB пробивает KC наружу = ВЗРЫВ. Momentum определяет направление.
  squeeze:
    enabled: true
    min_candles: 25 # Минимум свечей для расчёта
    bb_length: 20 # Период Bollinger Bands
    bb_std: 2.0 # Множитель стандартного отклонения BB
    kc_length: 20 # Период Keltner Channels
    kc_scalar: 1.5 # Множитель ATR для Keltner
    min_squeeze_bars: 4 # Минимум баров в сжатии перед выстрелом
    max_distance_to_level_pct: 3.0 # Широкий — squeeze работает и далеко от уровня
    vol_lookback: 20 # Lookback для проверки объёма при выстреле
    min_vol_ratio_on_fire: 0.8 # Мин объём при выстреле (0.8 = не ниже 80% среднего)

  # --- НОВЫЙ: Volume Explosion — институционал входит ---
  volume_explosion:
    enabled: true
    min_volume_ratio: 2.0 # 2x от среднего (было 3x — слишком строго)
    max_distance_to_level_pct: 1.0 # 1% от уровня (было 0.3% — мизер)
    avg_volume_lookback: 50
    min_body_ratio: 0.4 # Тело > 40% диапазона (фильтр доджи)

  # --- Поджатие (Compression) — SOFTENED ---
  compression:
    timeframe: "15"
    lookback_candles: 20
    min_r_squared: 0.35 # Было 0.5 — слишком строго для альтов
    max_distance_to_level_pct: 1.5 # Было 0.8% — расширено
    min_atr_contraction_pct: 12.0 # Было 15% — расширено
    anti_false_compression: true
    anti_false_lookback_candles: 10

  # --- Volume Spike (legacy, uses volume_explosion logic) ---
  volume_spike:
    timeframe: "5"
    min_volume_ratio: 2.0 # Было 3.0
    max_distance_to_level_pct: 1.0 # Было 0.3%
    avg_volume_lookback: 50
    min_body_ratio: 0.4

  # --- Каскад ликвидаций ---
  liquidation:
    window_seconds: 300
    min_cascade_count: 5
    min_cascade_volume_usd: 100000.0

  # --- Пробой уровня — SOFTENED ---
  breakout:
    enabled: true
    timeframe: "5"
    close_beyond_level: true
    min_breakout_volume_ratio: 1.5 # Было 2.0
    min_body_ratio: 0.4 # Было 0.5

# ==========================================
# СЕКЦИЯ 6: СКОРИНГ (SOFTENED)
# ==========================================
scoring:
  # --- Пороги алертов — РАДИКАЛЬНАЯ АГРЕССИЯ ---
  min_score_for_alert: 40 # Было 55
  min_score_for_setup_notify: 25 # Было 40

  # --- Веса компонентов скоринга ---
  weights:
    level_quality: 30 # Макс 30 баллов за уровень (касания + близость)
    fuel: 30 # Макс 30 баллов за объём + OI
    pattern: 25 # Макс 25 баллов за паттерн (поджатие/всплеск)
    macro: 15 # Макс ±15 баллов за BTC тренд + фандинг

  # --- Модификаторы (НОВОЕ) ---
  modifiers:
    # Бонус если монета из hot sector (AI, L2, Meme — целый сектор двигается)
    sector_momentum_bonus: 5

    # Штраф если уровень "несвежий" (>72ч без касания)
    stale_level_penalty: -10

    # Бонус если есть каскад ликвидаций рядом с уровнем
    liquidation_cascade_bonus: 10

    # Штраф если funding против направления сделки
    adverse_funding_penalty: -8

    # Бонус если funding В ПОЛЬЗУ направления (шорты платят лонгам)
    favorable_funding_bonus: 5

# ==========================================
# СЕКЦИЯ 7: УПРАВЛЕНИЕ АЛЕРТАМИ
# ==========================================
alerts:
  # Дедупликация: не повторять алерт по тому же символу+уровню
  cooldown_hours: 4

  # Ночной режим (крипта 24/7, но ты спишь)
  quiet_hours_enabled: true # Было false. Включаем — сон важнее.
  quiet_hours: ["02:00", "07:00"] # МСК. Тихие алерты копятся, утром — дайджест.

  # НОВОЕ: Утренний дайджест
  # В 07:05 МСК бот отправляет сводку: что произошло ночью,
  # какие монеты в вотчлисте, какие сетапы формируются.
  morning_digest_enabled: true
  morning_digest_time: "07:05"

  # Графики
  attach_chart: true
  chart_timeframe: "15" # M15 для скриншота
  chart_candles: 100 # Последние 100 свечей на графике

  # Risk/Reward в алерте
  show_risk_reward: true

  # НОВОЕ: Приоритеты алертов
  # Score 65-75: обычное уведомление (без звука)
  # Score 75-85: важное уведомление (со звуком)
  # Score 85+: критический алерт (со звуком + повтор через 2 мин если не прочитано)
  priority_tiers:
    normal:
      min_score: 65
      max_score: 74
      telegram_silent: true # Без звука
    important:
      min_score: 75
      max_score: 84
      telegram_silent: false # Со звуком
    critical:
      min_score: 85
      max_score: 100
      telegram_silent: false
      repeat_if_unread_minutes: 2 # Повтор через 2 мин

# ==========================================
# СЕКЦИЯ 8: УПРАВЛЕНИЕ РИСКАМИ (РАСШИРЕНО)
# ==========================================
risk:
  # Стоп-лосс: за уровень + запас на "закол" (ложный пробой)
  atr_stop_multiplier: 0.5 # Стоп = уровень ± 0.5 × ATR(14, H1)

  # Цель: кратно расстоянию от входа до стопа
  default_rr_ratio: 2.0 # Минимум R:R = 1:2

  # НОВОЕ: Максимальный стоп в процентах
  # Если расчётный стоп > этого значения — алерт НЕ отправляется.
  # Защита от торговли на монетах с огромным ATR и нереальным стопом.
  max_stop_pct: 3.0 # Стоп не может быть > 3% от входа

  # НОВОЕ: Предложение размера позиции
  # На основе фиксированного риска на сделку.
  position_sizing_enabled: true
  risk_per_trade_usd: 20.0 # Рискуешь $20 на сделку
  # Формула: position_size = risk_per_trade / (stop_distance_pct / 100)
  # Пример: риск $20, стоп 1.5% → позиция $1333
  
  # [GEKTOR v14.8.1] Global Portfolio Constraints
  max_total_beta: 1.0 # Максимальная бета всего портфеля (эквивалент 1x риска BTC)
  max_gross_exposure: 500000.0 # Максимальная суммарная позиция в $ (с учётом плеча)

# ==========================================
# СЕКЦИЯ 9: СЕКТОРА РЫНКА (НОВОЕ)
# ==========================================
# Если 3+ монеты из одного сектора одновременно в вотчлисте —
# это секторальный тренд. Бонус к скору для всего сектора.
sectors:
  enabled: true
  min_coins_for_sector_momentum: 3 # 3+ монеты = сектор горячий
  definitions:
    AI: ["FETUSDT", "RENDERUSDT", "TAOUSDT", "NEARUSDT", "GRTUSDT"]
    L1: ["SOLUSDT", "AVAXUSDT", "SUIUSDT", "APTUSDT", "SEIUSDT"]
    L2: ["ARBUSDT", "OPUSDT", "STRKUSDT", "MANTAUSDT"]
    DEFI: ["AABORUSDT", "UNIUSDT", "MKRUSDT", "AAVEUSDT"]
    MEME: ["DOGEUSDT", "PEPEUSDT", "WIFUSDT", "BONKUSDT", "FLOKIUSDT"]
    GAMING: ["IMXUSDT", "AXSUSDT", "GALAUSDT", "PIXELUSDT"]

# ==========================================
# СЕКЦИЯ 10: ХРАНЕНИЕ И ЛОГИ
# ==========================================
storage:
  db_path: "./data_run/sniper.db"
  candle_cache_max_days: 30
  alert_history_max_days: 180 # Было 90. 6 месяцев истории для статистики
  # НОВОЕ: автоочистка устаревших данных раз в сутки
  cleanup_hour: 4 # В 4:00 МСК (тихое время)

logging:
  level: "INFO"
  file: "./logs/sniper.log"
  rotation: "10 MB"
  retention: "14 days" # Было 7. Две недели — удобнее для дебага

# ==========================================
# СЕКЦИЯ 11: СТАТИСТИКА И ОБРАТНАЯ СВЯЗЬ (НОВОЕ)
# ==========================================
statistics:
  enabled: true

  # Еженедельный отчёт (воскресенье 20:00 МСК)
  weekly_report_enabled: true
  weekly_report_day: "sunday"
  weekly_report_time: "20:00"

  # НОВОЕ: Автокалибровка (экспериментально)
  auto_calibration_suggest: true
  min_acceptable_winrate: 0.40
  min_alerts_per_month: 10

# ==========================================
# СЕКЦИЯ 12: ORCHESTRATOR & EXECUTION (NEW v4.1)
# ==========================================
orchestrator:
  min_detectors: 1
  min_detectors_per_signal: 1
  min_score: 40 # Агрессивно снижено (Было 60)
  max_distance_percent: 5.0 # Адаптивно расширено (Было 1.5)
  confluence_window_seconds: 120 # Расширено до 120s для сбора мульти-таймфрейма
  signal_ttl_minutes: 15
  
execution:
  mode: "paper" # paper / live
  risk_percent: 1.5
  default_tp_percent: 5.0
  default_sl_percent: 3.0
  max_positions: 10
  hedge_enabled: true      # [Audit 16.3] Enable Delta-Neutral Hedging via SOR Saga
# ==========================================
# TIMEZONE
# ==========================================
timezone: "Europe/Moscow"
