[tool.mypy]
ignore_missing_imports = true
explicit_package_bases = true
exclude = ["venv", ".venv", "build", "dist"]
mypy_path = "."

[tool.ruff]
line-length = 120
exclude = ["venv", ".venv", "build", "dist"]
src = ["."]

[tool.pyright]
include = ["."]
extraPaths = ["."]
typeCheckingMode = "basic"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
